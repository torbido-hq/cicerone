# Event weights and feature wiring for the Cicerone recommender.
#
# Edit this file to change how signals are weighted or which columns from
# users.parquet / items.parquet feed the model — no code changes or image
# rebuild required (docker-compose mounts this file read-only into the
# container). Your own analytics/producer data can be wired in simply by
# adding a column to items.parquet and a matching entry below.
#
# NOTE: root-level keys (quantity_scaled_events, item_availability_filters)
# must be declared before any [table] header below — in TOML, key = value
# lines belong to whichever [table] they physically follow.

# event_type entries here scale their weight by log1p(quantity) instead of
# using a flat per-event weight (e.g. buying 3 bottles > buying 1).
quantity_scaled_events = ["purchase"]

# Boolean columns in items.parquet that must ALL be true for an item to ever
# be recommended. A listed column missing from items.parquet is skipped
# (fails open) rather than excluding every item.
item_availability_filters = ["published", "in_stock"]

# Base weight applied to each raw event_type before time-decay. Any
# event_type present in events.parquet but missing here is dropped (and
# logged as a warning) — this is how you add/retire signal types.
[event_weights]
purchase = 4.0
review_positive = 5.0
review_negative = -3.0
saved = 2.0
cart_add = 1.0
view = 0.3

# Caps how many times a given event_type counts per (user, item) pair before
# time-decay is applied. Protects against noisy high-frequency signals like
# repeated page views/bot traffic drowning out purchases/reviews.
[event_caps]
view = 5

# Columns expected in users.parquet and how to expose them to the model.
#   type: categorical -> single value per user (e.g. region)
#   type: list        -> multi-valued, one row per value (e.g. favorite styles)
[[user_features]]
column = "favorite_styles" # from user_favorite_styles
type = "list"

[[user_features]]
column = "region_slug" # from the user's primary address, if any
type = "categorical"

# Columns expected in items.parquet. Add producer/product analytics fields
# here (verified producer, plan tier, popularity bucket, avg rating bucket,
# etc.) as soon as your own export includes the corresponding column.
[[item_features]]
column = "category"
type = "categorical"

[[item_features]]
column = "primary_style"
type = "categorical"

[[item_features]]
column = "producer_id"
type = "categorical"

[[item_features]]
column = "region_slug"
type = "categorical"

[[item_features]]
column = "abv_bucket"
type = "categorical"

