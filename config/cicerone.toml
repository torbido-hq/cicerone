# Cicerone configuration.
#
# This file is meant to be edited (and mounted read-only into the container,
# see docker-compose.yml) without ever rebuilding the image. Secrets are
# never written here directly — reference them with "${ENV_VAR_NAME}" and
# set the actual value in your environment / .env (see .env.example). A
# referenced variable that isn't set fails config loading immediately. If
# you ever need a literal "${...}" value (no substitution), escape it with a
# doubled leading "$", e.g. "$${NOT_A_VAR}" resolves to "${NOT_A_VAR}".
#
# Input and output are each independently configurable. Every backend
# ("kind") interprets its own "options" table — see src/cicerone/io/ for the
# full list of options each one accepts. Built-in kinds:
#   "dataset" -> static parquet files, on S3-compatible object storage or a
#                local/mounted directory (src/cicerone/io/dataset_store.py)
#   "db"      -> a relational database table/query, via SQLAlchemy
#                (src/cicerone/io/db_store.py)

[job]
# "batch" (default): train on cron_schedule (below) + train_and_recommend,
# same as always. "serve": run the lightweight read API instead (see
# [serve] below) -- no training job runs in that mode/process.
mode = "batch" # "batch" | "serve"
top_k = 10
half_life_days = 90
cron_schedule = "0 3 * * *" # 5-field cron expression, evaluated in UTC
feature_config_path = "/app/config/features.toml"
# Recommendation strategies to fit and combine, in priority order (earlier
# entries win ties for the same user/item pair). Defaults to
# ["collaborative", "popular"] if omitted. Available: "collaborative"
# (LightFM, hybrid CF), "item_based" (item-item KNN), "popular" (global
# popularity fallback), "latest" (trending in the last two weeks).
# models = ["collaborative", "item_based", "popular", "latest"]

# Optional: combine the enabled strategies via weighted reciprocal rank
# fusion instead of the default priority order (personalized results win
# ties, non-personalized ones only backfill). If omitted, the priority
# combiner above is used. Every key must be one of the enabled "models".
# Note: an explicitly empty [job.model_weights] section still enables
# fusion mode, with every enabled strategy defaulting to weight 1.0.
#
# rrf_k tunes the reciprocal rank fusion constant used by model_weights
# (higher = lower ranks are discounted more gently). Only relevant when
# model_weights is set. Defaults to 60 (standard literature value).
# NOTE: rrf_k is a [job] key, so it must stay above [job.model_weights] —
# a bare key placed after a [table] header would be silently parsed as
# nested under that table instead of under [job].
# rrf_k = 60
# [job.model_weights]
# collaborative = 1.0
# item_based = 0.6
# popular = 0.3
# latest = 0.4

# Optional: instead of a fixed "models"/"model_weights" config, automatically
# backtest a set of candidate strategy/weight combinations over time-based
# folds of your own event history and pick the best one (by "primary_metric")
# for each run. Overrides "models"/"model_weights"/"rrf_k" above when enabled.
# [job.automl]
# enabled = true
# n_splits = 2       # number of time-based folds to backtest each candidate over
# test_days = 14     # size of each fold's held-out window, in days
# primary_metric = "MAP" # matched by prefix against "MAP@<top_k>"/"NDCG@<top_k>"/"Recall@<top_k>"
#
# Optional: override the default candidate search space (every strategy
# alone, the default priority combo, and a weighted-fusion blend). Each
# candidate is the same shape as "models"/"model_weights"/"rrf_k" above,
# except a candidate's "weights" table (if present) must give an explicit
# weight for every one of its "models" -- unlike "job.model_weights" above,
# there is no implicit default for an omitted model.
# [[job.automl.candidates]]
# models = ["popular"]
# [[job.automl.candidates]]
# models = ["collaborative", "item_based", "popular", "latest"]
# [job.automl.candidates.weights]
# collaborative = 1.0
# item_based = 0.7
# popular = 0.3
# latest = 0.3

# Optional: event-driven retraining, additive to cron_schedule above (both
# can fire; a run already in progress or started within debounce_seconds
# ignores/coalesces new triggers -- at most one run happens at a time).
# Runs in the same process as the cron loop (cicerone.scheduler).
# [job.trigger]
# enabled = true
# auth_token = "${TRIGGER_AUTH_TOKEN}" # required when enabled; checked as
#                                       # "Authorization: Bearer <token>"
# host = "0.0.0.0"
# port = 8080
# debounce_seconds = 60
# # POST /trigger/retrain on this port always works once trigger is enabled.
# # Additionally poll the *input* source for new/changed data and trigger a
# # run automatically (only supported for [input].kind = "dataset"; real S3
# # event notifications only deliver to SQS/SNS/Lambda and aren't portable
# # across S3-compatible backends, so polling is used instead):
# poll_input_bucket = false
# poll_interval_seconds = 300

[input]
kind = "dataset"

[input.options]
storage_backend = "s3" # "s3" | "local"
endpoint_url = "${INPUT_S3_ENDPOINT_URL}"
access_key_id = "${INPUT_S3_ACCESS_KEY_ID}"
secret_access_key = "${INPUT_S3_SECRET_ACCESS_KEY}"
bucket = "${INPUT_S3_BUCKET}"
prefix = "datasets/latest"
# storage_backend = "local" instead uses a single "path" option, e.g.:
# storage_backend = "local"
# path = "/data/input"

[output]
kind = "dataset"

[output.options]
storage_backend = "s3" # "s3" | "local"
endpoint_url = "${OUTPUT_S3_ENDPOINT_URL}"
access_key_id = "${OUTPUT_S3_ACCESS_KEY_ID}"
secret_access_key = "${OUTPUT_S3_SECRET_ACCESS_KEY}"
bucket = "${OUTPUT_S3_BUCKET}"
prefix = "recommendations/latest"

# Only relevant when [job].mode = "serve": a lightweight read API over the
# top-K recommendations the batch job already wrote to [output] above (it
# reads that same store directly -- no model is loaded to serve requests).
# For [output].kind = "dataset", the whole recommendations file is cached
# in memory and reloaded every refresh_interval_seconds; for "db" it's
# queried directly on every request (already indexed by user_id).
# [serve]
# auth_token = "${SERVE_AUTH_TOKEN}" # required; checked as "Authorization: Bearer <token>"
# host = "0.0.0.0"
# port = 8000
# default_k = 10 # used when a request doesn't specify ?k=
# refresh_interval_seconds = 60

# --- "db" kind example (commented out) ----------------------------------
# [input]
# kind = "db"
#
# [input.options]
# database_url = "${INPUT_DATABASE_URL}"
# events_table = "events"
# users_table = "users"
# items_table = "items"
# # Optional raw SQL overrides, e.g. to read straight from an application's
# # own schema instead of requiring materialized events/users/items tables:
# # events_query = "SELECT ... FROM analytics_events ..."
# # users_query = "SELECT ... FROM users ..."
# # items_query = "SELECT ... FROM products ..."
#
# [output]
# kind = "db"
#
# [output.options]
# database_url = "${OUTPUT_DATABASE_URL}"
# recommendations_table = "recommendations"
# manifest_table = "recommendation_runs"
