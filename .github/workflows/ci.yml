name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Same test image used for pytest (see the "test" job below), so lint
      # runs against the exact dependency set installed there — nothing to
      # install on the runner itself.
      - name: Build test image
        run: docker build --target test -t cicerone-test -f docker/Dockerfile .

      - name: Ruff lint
        run: docker run --rm cicerone-test ruff check src tests

      - name: Ruff format check
        run: docker run --rm cicerone-test ruff format --check src tests

      - name: mypy
        run: docker run --rm cicerone-test mypy src

      - name: pip-audit (dependency vulnerability scan)
        run: docker run --rm cicerone-test pip-audit -r requirements.txt -r requirements-dev.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Everything (including the test run itself) happens inside Docker —
      # the runner only needs Docker, never a host Python install, so CI
      # matches exactly how the service is built and deployed.
      - name: Run test suite (>=95% coverage required)
        run: |
          docker compose -f docker-compose.ci.yml up \
            --build --abort-on-container-exit --exit-code-from test

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
