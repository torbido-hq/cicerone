version: "3.9"

# Cicerone — a generic, low-volume batch recommender (rectools + LightFM).
# Everything about how it's wired up (input/output backend, tuning,
# scheduling) lives in config/cicerone.toml — see README.md. This file only
# supplies the secrets that cicerone.toml references via ${...} placeholders
# (set them in .env, see .env.example).
#
# Two independent services, same image:
#   recommender — the batch training job (cron + optional event trigger,
#                 see [job.trigger] in config/cicerone.toml).
#   serve       — the lightweight read API over precomputed recommendations
#                 (config/cicerone.serve.toml, job.mode = "serve"). Optional:
#                 comment it out if you only need the batch job.

services:
  recommender:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: "Europe/Rome"

      INPUT_S3_ENDPOINT_URL: ${INPUT_S3_ENDPOINT_URL:-}
      INPUT_S3_ACCESS_KEY_ID: ${INPUT_S3_ACCESS_KEY_ID:-}
      INPUT_S3_SECRET_ACCESS_KEY: ${INPUT_S3_SECRET_ACCESS_KEY:-}
      INPUT_S3_BUCKET: ${INPUT_S3_BUCKET:-}
      INPUT_DATABASE_URL: ${INPUT_DATABASE_URL:-}

      OUTPUT_S3_ENDPOINT_URL: ${OUTPUT_S3_ENDPOINT_URL:-}
      OUTPUT_S3_ACCESS_KEY_ID: ${OUTPUT_S3_ACCESS_KEY_ID:-}
      OUTPUT_S3_SECRET_ACCESS_KEY: ${OUTPUT_S3_SECRET_ACCESS_KEY:-}
      OUTPUT_S3_BUCKET: ${OUTPUT_S3_BUCKET:-}
      OUTPUT_DATABASE_URL: ${OUTPUT_DATABASE_URL:-}

      # Only used if config/cicerone.toml sets [job.trigger].enabled = true.
      TRIGGER_AUTH_TOKEN: ${TRIGGER_AUTH_TOKEN:-}
    ports:
      - "8080:8080" # only listens if [job.trigger].enabled = true
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

  serve:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      TZ: "Europe/Rome"
      CICERONE_CONFIG_PATH: /app/config/cicerone.serve.toml

      OUTPUT_S3_ENDPOINT_URL: ${OUTPUT_S3_ENDPOINT_URL:-}
      OUTPUT_S3_ACCESS_KEY_ID: ${OUTPUT_S3_ACCESS_KEY_ID:-}
      OUTPUT_S3_SECRET_ACCESS_KEY: ${OUTPUT_S3_SECRET_ACCESS_KEY:-}
      OUTPUT_S3_BUCKET: ${OUTPUT_S3_BUCKET:-}
      SERVE_AUTH_TOKEN: ${SERVE_AUTH_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

